name: release

# Publish binaries whenever a version tag is pushed, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux uses musl -> fully static binaries that run on ANY Linux
          # (Alpine, Ubuntu, scratch containers) with no glibc dependency.
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl,  asset: enc-linux-x86_64,  cross: true }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl, asset: enc-linux-aarch64, cross: true }
          # macOS: build both arches on the Apple-Silicon runner (x86_64 cross-compiles).
          - { os: macos-latest,   target: aarch64-apple-darwin,       asset: enc-macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,        asset: enc-macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     asset: enc.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for static musl Linux builds)
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Prepare asset
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/enc.exe" "${{ matrix.asset }}"
          else
            cp "target/${{ matrix.target }}/release/enc" "${{ matrix.asset }}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
