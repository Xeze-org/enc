name: release

# Publish binaries whenever a version tag is pushed, e.g.  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    name: build ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,   asset: enc-linux-x86_64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,  asset: enc-linux-aarch64, linker: gcc-aarch64-linux-gnu }
          # Both built on the Apple-Silicon runner; the x86_64 one cross-compiles
          # (the retired macos-13 Intel runner is no longer available).
          - { os: macos-latest,   target: aarch64-apple-darwin,       asset: enc-macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,        asset: enc-macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,     asset: enc.exe }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross linker (aarch64 linux)
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "target/${{ matrix.target }}/release/enc.exe" "${{ matrix.asset }}"
          else
            cp "target/${{ matrix.target }}/release/enc" "${{ matrix.asset }}"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
          fail_on_unmatched_files: true
